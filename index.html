<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Permanent+Marker&display=swap');

        body {
            background-color: #050505;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* VHS Gritty Overlay */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Top Red Bar */
        .top-bar {
            background-color: #ff0000;
            height: 50px;
            display: flex;
            align-items: center;
            padding-left: 20px;
            border-bottom: 3px solid #330000;
            position: relative;
            z-index: 5;
        }

        .top-bar h1 {
            color: #000;
            margin: 0;
            font-family: 'Permanent Marker', cursive;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .sub-text {
            color: #888;
            font-size: 12px;
            padding-left: 20px;
            margin-top: 5px;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            z-index: 5;
        }

        /* Blurry Background */
        .bg-blur {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('https://i.postimg.cc/fRndTGY0/edited.png') no-repeat center center;
            background-size: cover;
            filter: blur(8px) grayscale(40%) contrast(120%) brightness(80%);
            z-index: 1;
        }

        /* Centered Military Text */
        .center-content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15vh;
            text-align: center;
        }

        .military-title {
            font-family: 'Black Ops One', system-ui;
            font-size: 100px;
            color: #ff0000;
            text-shadow: 4px 4px 0px #330000;
            margin: 0;
            letter-spacing: 5px;
        }

        .custom-subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            color: #ccc;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="top-bar">
        <h1>BRUTAL RIGHT WING</h1>
    </div>
    <div class="sub-text">The Anti-Degeneracy.</div>

    <div class="center-content">
        <h1 class="military-title">TITLE</h1>
        <div class="custom-subtitle">Type your custom text right here</div>
    </div>

</body>
</html>
